<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store" />
  <link href="css/normalize.css" rel="stylesheet">
  <!-- Fontawesome (brands + solid) -->
  <link href="css/fontawesome.css" rel="stylesheet">
  <link href="css/brands.css" rel="stylesheet">
  <link href="css/solid.css" rel="stylesheet">
  <link href="css/scamper-hljs.css" rel="stylesheet">
  <link href="index.css" rel="stylesheet">
</head>
<body>
  <div id="sidebar">
    <div id="title">
      Scamper <span id="version">{{ver}}</span> 
    </div>
    <div id="sidebar-actions">
      <button id="create-file" class="fa-solid fa-file" aria-label="Create file"></button>
      <input type="file" id="upload-file-input" style="display:none;" />
      <button id="upload-file" class="fa-solid fa-upload" aria-label="Upload file"></button>
      <button id="download-archive" class="fa-solid fa-file-zipper" aria-label="Download zip archive" disabled></button>
      ⋅
      <button id="rename-file" class="fa-solid fa-pencil" aria-label="Rename file"></button>
      <button id="delete-file" class="fa-solid fa-trash" aria-label="Delete file"></button>
      <button id="download-file" class="fa-solid fa-download" aria-label="Download file"></button>
    </div>
    <div id="file-drawer">
      <div class="file">example.scm</div>
      <div class="file selected">another-file.scm</div>
      <div class="file">foo.scm</div>
    </div>
  </div>
  <div id="ide">
    <div id="header">
      <div class="text-align: left;">
        <button id="toggle-sidebar" class="fa fa-bars" aria-label="Toggle sidebar"></button>
        ⋅
        <button id="run" class="fa-solid fa-play" aria-label="Run" accesskey="w" aria-keyshortcuts="w"></button>
        <!-- TODO: we should really be using react... this is repeated for tracing -->
        <div id="in-progress">
          <button id="stop" class="fa-solid fa-stop" aria-label="Stop"></button>
          <div class="fa-solid fa-spinner fa-spin"></div>
        </div>
        <button id="step" class="fa-solid fa-route" aria-label="Trace"></button>
        <button id="run-window" class="fa-solid fa-window-maximize" aria-label="Maximize Output Window "></button>
        <button id="ast-window" class="fa-solid fa-tree" aria-label="Display Syntax Tree" disabled></button>
        ⋅
        <a href="docs.html">Docs</a>
        ⋅
        <a href="reference.html">Reference</a>
      </div>
      <div class="text-align: right; font-size: 0.75em; color: #333;">
        <a href="https://github.com/slag-plt/scamper" role="button" aria-label="Scamper Repository"><i class="fa-brands fa-github"></i></a> ⋅
        <em><a href="https://github.com/slag-plt/scamper/issues">Report an issue</a></em>
      </div>
    </div>
    <div id="content">
      <div id="editor"></div>
      <div id="results">
        <div id="results-toolbar">
          <div class="text-align: left;">
            <button id="step-once" class="fa-solid fa-shoe-prints" aria-label="Step once"></button>
            <button id="step-stmt" class="fa-solid fa-forward-step" aria-label="Step Statement"></button>
            <button id="step-all" class="fa-solid fa-forward" aria-label="Step All"></button>
            <div id="in-progress-trace">
              <button id="stop-trace" class="fa-solid fa-stop" aria-label="Stop Trace"></button>
              <div class="fa-solid fa-spinner fa-spin"></div>
            </div>
            <button id="ast-text" class="fa-solid fa-tree" aria-label="Show AST" disabled></button>
          </div>
          <div id="results-status" class="text-align: right;"></div>
        </div>
        <div id="output" accesskey="i" tabindex="0" aria-label="Output pane"></div>
      </div>
    </div>
  </div>
  <div id="loading">
    <div id="loading-content">
      Loading Scamper...
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", (event) => {
      document.getElementById("loading").style.display = "none";
    })
  </script>
  <script type="module" src="/src/web/ide.ts"></script>
</body>
</html>
